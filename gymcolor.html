<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GymColor</title>
<meta name="description" content="Sua cor fala por você na academia."/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E03535;--green:#22C55E;--yellow:#EAB308;--purple:#9333EA;
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--line:#1e1e1e;
  --text:#fff;--muted:#666;--faint:#2a2a2a;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── NAV ── */
.top-bar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;color:#fff}
.logo span{color:var(--green)}
.top-right{display:flex;align-items:center;gap:10px}

/* ── LANG PICKER ── */
.lang-wrap{position:relative}
.lang-btn{
  display:flex;align-items:center;gap:5px;
  background:#1a1a1a;border:1px solid #333;border-radius:20px;
  padding:6px 12px;color:#ccc;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;
}
.lang-dropdown{
  display:none;position:absolute;top:36px;right:0;
  background:#1a1a1a;border:1px solid #333;border-radius:12px;
  overflow:hidden;z-index:200;min-width:110px;
  box-shadow:0 8px 24px #00000088;
}
.lang-dropdown.open{display:block}
.lang-opt{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:10px 14px;background:none;border:none;
  color:#888;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;text-align:left;
}
.lang-opt:hover,.lang-opt.active{background:#222;color:#fff}

/* ── COLOR BADGE (header) ── */
.color-badge{
  display:flex;align-items:center;gap:6px;
  border:1.5px solid;border-radius:30px;padding:6px 12px;
  font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.badge-dot{width:9px;height:9px;border-radius:50%}

/* ── BOTTOM TABS ── */
.bottom-tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:none;
  background:rgba(8,8,8,0.96);border-top:1px solid var(--line);
  padding:8px 0 env(safe-area-inset-bottom,8px);
}
.bottom-tabs.visible{display:flex}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:#444;font-size:9px;font-weight:700;
  cursor:pointer;padding:6px 4px;font-family:'Inter',sans-serif;
  letter-spacing:0.3px;transition:color 0.2s;
}
.tab-btn .tab-icon{font-size:20px;line-height:1}
.tab-btn.active{color:var(--accent,#22C55E)}

/* ── LANDING ── */
#screen-landing{
  display:block;
  background:var(--bg);
}
.landing-inner{max-width:480px;margin:0 auto;padding:0 24px 80px}

.hero-section{
  padding:60px 0 48px;text-align:center;
  position:relative;overflow:hidden;
}
.hero-section::before{
  content:'';position:absolute;top:-150px;left:50%;transform:translateX(-50%);
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,#22C55E0a 0%,transparent 70%);
  pointer-events:none;
  animation:pulse-bg 4s ease-in-out infinite;
}
@keyframes pulse-bg{0%,100%{opacity:0.5;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}

.band-row{display:flex;gap:8px;justify-content:center;margin-bottom:36px;flex-wrap:wrap}
.band{
  display:flex;align-items:center;gap:7px;
  border:1.5px solid;border-radius:40px;padding:7px 14px;
  font-size:11px;font-weight:700;letter-spacing:0.3px;
  transition:all 0.4s;opacity:0.35;
}
.band.active{opacity:1}
.band-dot{width:9px;height:9px;border-radius:50%}
.band-red{border-color:var(--red);color:var(--red)}.band-red .band-dot{background:var(--red)}
.band-green{border-color:var(--green);color:var(--green)}.band-green .band-dot{background:var(--green)}
.band-yellow{border-color:var(--yellow);color:var(--yellow)}.band-yellow .band-dot{background:var(--yellow)}
.band-purple{border-color:var(--purple);color:var(--purple)}.band-purple .band-dot{background:var(--purple)}
.band-red.active{box-shadow:0 0 18px #E0353544}
.band-green.active{box-shadow:0 0 18px #22C55E44}
.band-yellow.active{box-shadow:0 0 18px #EAB30844}
.band-purple.active{box-shadow:0 0 18px #9333EA44}

.eyebrow{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
h1.hero-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(52px,14vw,88px);line-height:0.92;letter-spacing:-1px;
  text-transform:uppercase;margin-bottom:20px;
}
h1.hero-title .hl{
  display:block;
  background:linear-gradient(90deg,var(--green),#5eeea0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:15px;color:var(--muted);line-height:1.65;margin-bottom:40px}

/* waitlist form */
.wl-box{width:100%}
.input-row{
  display:flex;gap:8px;
  background:var(--bg3);border:1.5px solid var(--faint);
  border-radius:14px;padding:6px 6px 6px 16px;
  transition:border-color 0.2s;
}
.input-row:focus-within{border-color:var(--green)}
.input-row input{
  flex:1;background:none;border:none;outline:none;
  color:#fff;font-size:14px;font-family:'Inter',sans-serif;padding:10px 0;
}
.input-row input::placeholder{color:#444}
.submit-btn{
  background:var(--green);color:#000;border:none;border-radius:10px;
  padding:11px 18px;font-size:13px;font-weight:800;cursor:pointer;
  font-family:'Inter',sans-serif;white-space:nowrap;transition:opacity 0.2s;
}
.submit-btn:hover{opacity:0.85}
.form-note{font-size:11px;color:#444;margin-top:10px;text-align:center}
.success-wl{
  display:none;background:#22C55E14;border:1px solid #22C55E44;
  border-radius:14px;padding:16px;text-align:center;
  color:var(--green);font-weight:600;font-size:14px;
}
.success-wl.show{display:block}

/* color cards */
.section-label{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:24px;text-align:center}
.colors-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:48px}
.color-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:16px;
  padding:18px 16px;transition:border-color 0.3s,transform 0.2s;cursor:default;
}
.color-card:hover{transform:translateY(-2px)}
.color-card.red:hover{border-color:var(--red)}
.color-card.green:hover{border-color:var(--green)}
.color-card.yellow:hover{border-color:var(--yellow)}
.color-card.purple:hover{border-color:var(--purple)}
.color-pill{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:30px;padding:4px 10px;font-size:11px;font-weight:700;margin-bottom:10px;
}
.pill-dot{width:7px;height:7px;border-radius:50%}
.pill-r{background:#E0353514;color:var(--red)}.pill-r .pill-dot{background:var(--red)}
.pill-g{background:#22C55E14;color:var(--green)}.pill-g .pill-dot{background:var(--green)}
.pill-y{background:#EAB30814;color:var(--yellow)}.pill-y .pill-dot{background:var(--yellow)}
.pill-p{background:#9333EA14;color:var(--purple)}.pill-p .pill-dot{background:var(--purple)}
.color-card h3{font-size:14px;font-weight:700;margin-bottom:6px}
.color-card p{font-size:12px;color:var(--muted);line-height:1.5}

/* how row */
.how-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:48px}
.how-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px 14px;text-align:center}
.how-icon{font-size:26px;margin-bottom:10px}
.how-card h3{font-size:13px;font-weight:700;margin-bottom:6px}
.how-card p{font-size:11px;color:var(--muted);line-height:1.5}

/* honest box */
.honest-box{
  background:var(--bg2);border:1px solid var(--line);border-radius:18px;
  padding:24px 20px;margin-bottom:48px;text-align:center;
}
.honest-box .big-emoji{font-size:40px;margin-bottom:14px}
.honest-box h3{font-size:18px;font-weight:800;margin-bottom:10px}
.honest-box p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:16px}
.honest-list{display:flex;flex-direction:column;gap:8px;text-align:left}
.honest-item{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#aaa}
.honest-item span:first-child{color:var(--green);flex-shrink:0;margin-top:1px}

/* faq */
.faq-item{border-bottom:1px solid var(--line);padding:16px 0;cursor:pointer}
.faq-q{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;gap:12px}
.faq-arrow{color:var(--muted);font-size:11px;flex-shrink:0;transition:transform 0.2s}
.faq-a{font-size:12px;color:var(--muted);line-height:1.65;margin-top:10px;display:none}
.faq-item.open .faq-a{display:block}
.faq-item.open .faq-arrow{transform:rotate(180deg)}

/* cta bottom */
.cta-bottom{text-align:center;padding:60px 0}
.cta-bottom h2{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(36px,10vw,64px);text-transform:uppercase;
  line-height:0.95;margin-bottom:16px;letter-spacing:-0.5px;
}
.cta-bottom p{font-size:14px;color:var(--muted);margin-bottom:32px}

.enter-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:#fff;color:#000;border:none;border-radius:14px;
  padding:16px 28px;font-size:15px;font-weight:800;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:opacity 0.2s;width:100%;justify-content:center;
}
.enter-btn:hover{opacity:0.88}

footer{border-top:1px solid var(--line);padding:24px;text-align:center;font-size:12px;color:#333}

/* ── CHECKIN ── */
#screen-checkin{padding-bottom:20px}
.checkin-inner{max-width:480px;margin:0 auto;padding:28px 20px}
.screen-title-sm{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
.screen-title{font-size:26px;font-weight:900;letter-spacing:-0.5px;margin-bottom:28px;white-space:pre-line}
.color-options{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.color-opt{
  display:flex;align-items:center;gap:14px;
  background:var(--bg2);border:2px solid var(--line);border-radius:16px;
  padding:14px 16px;cursor:pointer;transition:all 0.2s;text-align:left;
  font-family:'Inter',sans-serif;width:100%;
}
.color-opt.selected{background:var(--sel-bg)}
.opt-avatar{
  width:42px;height:42px;border-radius:50%;
  background:var(--bg3);border:3px solid var(--c);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;transition:background 0.2s;
}
.color-opt.selected .opt-avatar{background:var(--c);box-shadow:0 0 14px color-mix(in srgb,var(--c) 50%,transparent)}
.opt-info{flex:1}
.opt-label{font-size:14px;font-weight:700;color:#ddd;margin-bottom:3px;transition:color 0.2s}
.color-opt.selected .opt-label{color:var(--c)}
.opt-desc{font-size:11px;color:var(--muted)}
.checkin-btn{
  width:100%;padding:16px;border:none;border-radius:14px;
  font-size:15px;font-weight:800;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.3s;
}
.checkin-btn:disabled{background:var(--bg3);color:#333;cursor:not-allowed}

/* ── GYM FLOOR (tabs content) ── */
#screen-gym{padding-bottom:80px}
.gym-inner{max-width:480px;margin:0 auto}

/* subtabs */
.subtabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--line);scrollbar-width:none}
.subtabs::-webkit-scrollbar{display:none}
.subtab{
  flex:0 0 auto;padding:12px 16px;background:none;border:none;
  border-bottom:2px solid transparent;color:#444;font-size:11px;
  font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'Inter',sans-serif;letter-spacing:0.3px;transition:all 0.2s;
}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-content{display:none;padding:16px 20px}
.tab-content.active{display:block}

/* legend */
.legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:4px;background:var(--bg2);border-radius:20px;padding:4px 8px;font-size:10px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}

/* user cards */
.user-list{display:flex;flex-direction:column;gap:10px}
.user-card{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border:1.5px solid var(--line);
  border-radius:14px;padding:12px 14px;
}
.user-card.me{background:var(--me-bg);border-color:var(--me-c)}
.u-avatar-wrap{position:relative;flex-shrink:0}
.u-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--bg3);border:3px solid var(--uc);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:var(--uc);
  box-shadow:0 0 10px color-mix(in srgb,var(--uc) 30%,transparent);
}
.u-status-dot{
  position:absolute;bottom:0;right:0;
  width:12px;height:12px;border-radius:50%;
  background:var(--uc);border:2px solid var(--bg);
  box-shadow:0 0 5px var(--uc);
}
.u-info{flex:1;min-width:0}
.u-name{font-size:14px;font-weight:700;margin-bottom:2px}
.u-color{font-size:11px;font-weight:600;color:var(--uc);margin-bottom:2px}
.u-bio{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-action{
  background:var(--uc);border:none;border-radius:10px;
  padding:7px 11px;font-size:11px;font-weight:800;
  color:#000;cursor:pointer;flex-shrink:0;font-family:'Inter',sans-serif;
}

/* QR */
.qr-section{text-align:center;padding:20px 0}
.qr-desc{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.qr-wrap{
  display:inline-block;background:#fff;padding:16px;
  border-radius:16px;margin-bottom:20px;
}
.band-badge{
  display:inline-flex;align-items:center;gap:10px;
  border:2px solid;border-radius:40px;padding:10px 20px;
  margin-bottom:8px;font-size:14px;font-weight:700;
}
.band-badge-dot{width:13px;height:13px;border-radius:50%}
.qr-note{font-size:11px;color:var(--muted);margin-bottom:24px}
.outline-btn{
  width:100%;padding:14px;background:none;
  border:1.5px solid;border-radius:14px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:opacity 0.2s;
}
.outline-btn:hover{opacity:0.8}

/* BT */
.bt-section{text-align:center;padding:20px 0}
.bt-watch{
  width:110px;height:110px;border-radius:50%;
  background:var(--bg2);border:4px solid;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;margin:0 auto 24px;
  position:relative;transition:all 0.6s;
}
.bt-watch-check{
  position:absolute;bottom:4px;right:4px;
  width:22px;height:22px;border-radius:50%;
  border:3px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;display:none;
}
.bt-title{font-size:18px;font-weight:800;margin-bottom:10px}
.bt-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px;max-width:300px;margin-left:auto;margin-right:auto}
.bt-info{
  background:var(--bg2);border:1px solid;border-radius:14px;
  padding:14px 16px;margin-bottom:20px;text-align:left;display:none;
}
.bt-info.show{display:block}
.bt-info-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.bt-info-row:last-child{margin-bottom:0}
.bt-dot-live{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.primary-btn{
  width:100%;padding:15px;border:none;border-radius:14px;
  font-size:14px;font-weight:800;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.3s;
}

/* MAP */
.map-section{padding:4px 0}
.map-gym-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.gym-item{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border:1.5px solid var(--line);
  border-radius:14px;padding:13px 14px;cursor:pointer;
  transition:all 0.2s;font-family:'Inter',sans-serif;width:100%;text-align:left;
}
.gym-item.selected{background:var(--sel-gym-bg);border-color:var(--accent)}
.gym-icon{font-size:22px;flex-shrink:0}
.gym-name{font-size:13px;font-weight:700;color:#ddd;margin-bottom:2px;transition:color 0.2s}
.gym-item.selected .gym-name{color:var(--accent)}
.gym-meta{font-size:11px;color:var(--muted)}
.gym-sel-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 5px var(--accent);flex-shrink:0;display:none}
.gym-item.selected .gym-sel-dot{display:block}
.map-visual{
  width:100%;height:150px;border-radius:14px;
  background:var(--bg2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;margin-bottom:16px;
}
.map-grid-h{position:absolute;left:0;right:0;height:1px;background:#ffffff06}
.map-grid-v{position:absolute;top:0;bottom:0;width:1px;background:#ffffff06}
.map-pin-label{font-size:11px;font-weight:700;margin-top:4px}
.map-checkin-btn{
  width:100%;padding:15px;border:none;border-radius:14px;
  font-size:14px;font-weight:800;color:#000;cursor:pointer;
  font-family:'Inter',sans-serif;
}

/* locating */
.locating{text-align:center;padding:60px 0}
.locating-icon{font-size:36px;margin-bottom:12px}
.locating-text{color:var(--muted);font-size:13px}

@media(max-width:400px){
  .colors-grid{grid-template-columns:1fr}
  .how-row{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     SCREEN: LANDING
═══════════════════════════════════════════ -->
<div id="screen-landing" class="screen active">
  <div class="top-bar">
    <span class="logo">GYM<span>COLOR</span></span>
    <div class="top-right">
      <div class="lang-wrap">
        <button class="lang-btn" onclick="toggleLang()">
          <span id="lang-flag">🇧🇷</span>
          <span id="lang-code">PT</span>
          <span style="font-size:9px;color:#555">▼</span>
        </button>
        <div class="lang-dropdown" id="lang-dropdown">
          <button class="lang-opt active" onclick="setLang('pt')">🇧🇷 PT</button>
          <button class="lang-opt" onclick="setLang('en')">🇺🇸 EN</button>
          <button class="lang-opt" onclick="setLang('es')">🇪🇸 ES</button>
        </div>
      </div>
      <button class="enter-btn" onclick="goTo('checkin')" style="width:auto;padding:8px 16px;font-size:13px;border-radius:10px" data-i18n="enterBtn"></button>
    </div>
  </div>

  <div class="landing-inner">
    <!-- HERO -->
    <div class="hero-section">
      <div class="band-row">
        <div class="band band-red active" id="lband-red"><div class="band-dot"></div><span data-i18n="bandRed"></span></div>
        <div class="band band-green" id="lband-green"><div class="band-dot"></div><span data-i18n="bandGreen"></span></div>
        <div class="band band-yellow" id="lband-yellow"><div class="band-dot"></div><span data-i18n="bandYellow"></span></div>
        <div class="band band-purple" id="lband-purple"><div class="band-dot"></div><span data-i18n="bandPurple"></span></div>
      </div>
      <p class="eyebrow" data-i18n="eyebrow"></p>
      <h1 class="hero-title">
        <span data-i18n="h1line1"></span><br/>
        <span class="hl" data-i18n="h1line2"></span>
      </h1>
      <p class="hero-sub" data-i18n="heroSub"></p>

      <!-- WAITLIST -->
      <div class="wl-box">

// ════════════════════════════════════════
let lang = 'pt';
let myColor = null;
let currentScreen = 'landing';
let currentSubtab = 'lista';
let btStatus = 'idle'; // idle | connecting | connected
let selectedGym = 1;
let selectedColorInCheckin = null;

// ════════════════════════════════════════
// LANG
// ════════════════════════════════════════
function t(key){ return T[lang][key] || key }

function setLang(l){
  lang = l;
  const flags = {pt:'🇧🇷',en:'🇺🇸',es:'🇪🇸'};
  const codes = {pt:'PT',en:'EN',es:'ES'};
  ['','2','3'].forEach(s=>{
    const f=document.getElementById('lang-flag'+s);
    const c=document.getElementById('lang-code'+s);
    if(f)f.textContent=flags[l];
    if(c)c.textContent=codes[l];
    const dd=document.getElementById('lang-dropdown'+s);
    if(dd){dd.classList.remove('open');dd.querySelectorAll('.lang-opt').forEach(o=>{o.classList.toggle('active',o.textContent.trim().endsWith(codes[l]))})}
  });
  applyI18n();
  if(currentScreen==='checkin') renderCheckin();
  if(currentScreen==='gym'){ renderGymTabs(); renderUserList(); updateQR(); updateBT(); renderMap(); }
  document.querySelectorAll('.lang-dropdown').forEach(d=>d.classList.remove('open'));
}

function toggleLang(){
  document.querySelectorAll('.lang-dropdown').forEach(d=>d.classList.toggle('open'));
}

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    if(T[lang][key]!==undefined) el.textContent=T[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
    const key=el.getAttribute('data-i18n-placeholder');
    if(T[lang][key]) el.placeholder=T[lang][key];
  });
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function goTo(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  currentScreen = screen;
  document.getElementById('bottom-tabs').classList.toggle('visible', screen==='gym');
  if(screen==='checkin') renderCheckin();
  if(screen==='gym') initGym();
  window.scrollTo(0,0);
}

// ════════════════════════════════════════
// LANDING BANDS ANIMATION
// ════════════════════════════════════════
const bandIds = ['red','green','yellow','purple'];
let bandIdx = 0;
setInterval(()=>{
  document.querySelectorAll('[id^="lband-"]').forEach(b=>b.classList.remove('active'));
  bandIdx=(bandIdx+1)%bandIds.length;
  const el=document.getElementById('lband-'+bandIds[bandIdx]);
  if(el) el.classList.add('active');
},1800);

// ════════════════════════════════════════
// WAITLIST
// ════════════════════════════════════════
function handleWL(e){
  e.preventDefault();
  document.getElementById('wl-form').style.display='none';
  document.getElementById('wl-success').classList.add('show');
}

// ════════════════════════════════════════
// FAQ
// ════════════════════════════════════════
function toggleFaq(el){
  const isOpen=el.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));
  if(!isOpen) el.classList.add('open');
}

// ════════════════════════════════════════
// CHECKIN
// ════════════════════════════════════════
function renderCheckin(){
  const opts = document.getElementById('color-options');
  opts.innerHTML='';
  Object.entries(COLORS_CFG).forEach(([id,cfg])=>{
    const label = T[lang].colorLabels[id];
    const desc  = T[lang].colorDescs[id];
    const icon  = T[lang].colorIcons[id];
    const sel   = selectedColorInCheckin===id;
    const div=document.createElement('button');
    div.className='color-opt'+(sel?' selected':'');
    div.style.setProperty('--c',cfg.hex);
    div.style.setProperty('--sel-bg',cfg.hex+'18');
    div.style.borderColor=sel?cfg.hex:'var(--line)';
    div.style.boxShadow=sel?`0 0 18px ${cfg.hex}33`:'none';
    div.innerHTML=`
      <div class="opt-avatar">${sel?'✓':icon}</div>
      <div class="opt-info">
        <div class="opt-label">${label}</div>
        <div class="opt-desc">${desc}</div>
      </div>`;
    div.onclick=()=>{
      selectedColorInCheckin=id;
      renderCheckin();
      const btn=document.getElementById('checkin-btn');
      btn.disabled=false;
      btn.style.background=cfg.hex;
      btn.style.color='#000';
      btn.style.boxShadow=`0 4px 20px ${cfg.hex}55`;
      btn.textContent=`${t('checkinBtnReady')} ${getEmoji(id)}`;
    };
    opts.appendChild(div);
  });
}

function getEmoji(id){return{vermelho:'🔴',verde:'🟢',amarelo:'🟡',roxo:'🟣'}[id]||''}

function doCheckin(){
  if(!selectedColorInCheckin) return;
  myColor=selectedColorInCheckin;
  goTo('gym');
}

// ════════════════════════════════════════
// GYM
// ════════════════════════════════════════
function initGym(){
  renderGymTabs();
  renderUserList();
  updateMyBadge();
  updateQR();
  updateBT();
  renderMap();
  switchSubtab(currentSubtab);
}

function getAccent(){ return myColor?COLORS_CFG[myColor].hex:COLORS_CFG.verde.hex }

function updateMyBadge(){
  const badge=document.getElementById('my-color-badge');
  if(!myColor||!badge) return;
  const cfg=COLORS_CFG[myColor];
  const label=T[lang].colorLabels[myColor];
  badge.style.borderColor=cfg.hex;
  badge.style.color=cfg.hex;
  badge.style.boxShadow=`0 0 10px ${cfg.hex}33`;
  badge.innerHTML=`<div class="badge-dot" style="background:${cfg.hex};box-shadow:0 0 5px ${cfg.hex}"></div>${t('you')}`;
  document.getElementById('bottom-tabs').style.setProperty('--accent',cfg.hex);
  document.querySelectorAll('.tab-btn').forEach(b=>b.style.setProperty('--accent',cfg.hex));
}

function renderGymTabs(){
  const tabs=[
    {id:'lista',label:t('tabGym')},
    {id:'qr',label:t('tabQR')},
    {id:'bt',label:t('tabBT')},
    {id:'map',label:t('tabMap')},
  ];
  const wrap=document.getElementById('subtabs');
  wrap.innerHTML='';
  tabs.forEach(tb=>{
    const b=document.createElement('button');
    b.className='subtab'+(currentSubtab===tb.id?' active':'');
    b.id='stab-'+tb.id;
    b.textContent=tb.label;
    b.style.setProperty('--accent',getAccent());
    if(currentSubtab===tb.id) b.style.color=getAccent();
    b.onclick=()=>switchSubtab(tb.id);
    wrap.appendChild(b);
  });

  // also update bottom tabs labels
  const bkeys=['lista','qr','bt','map'];
  const blabels=[t('tabGym'),t('tabQR'),t('tabBT'),t('tabMap')];
  bkeys.forEach((k,i)=>{
    const btn=document.getElementById('btntab-'+k);
    if(btn){
      const spans=btn.querySelectorAll('span');
      if(spans[1]) spans[1].textContent=blabels[i];
      btn.style.setProperty('--accent',getAccent());
    }
  });
}

function switchSubtab(id){
  currentSubtab=id;
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.subtab').forEach(b=>{ b.classList.remove('active'); b.style.color=''; });
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const tc=document.getElementById('tab-'+id);
  if(tc) tc.classList.add('active');
  const st=document.getElementById('stab-'+id);
  if(st){ st.classList.add('active'); st.style.color=getAccent(); }
  const bt=document.getElementById('btntab-'+id);
  if(bt) bt.classList.add('active');
  if(id==='map') initMap();
}

// ─── USER LIST ───────────────────────────────
function renderUserList(){
  const accent=getAccent();
  // legend
  const leg=document.getElementById('legend');
  if(leg){
    leg.innerHTML=Object.entries(COLORS_CFG).map(([id,cfg])=>`
      <div class="leg-item">
        <div class="leg-dot" style="background:${cfg.hex}"></div>
        ${T[lang].colorLabels[id].split(' ').slice(0,2).join(' ')}
      </div>`).join('');
  }
  const list=document.getElementById('user-list');
  if(!list) return;
  const me={id:0,nome:t('you'),cor:myColor||'verde',avatar:'V',bio:'👋'};
  const all=[me,...MOCK_USERS];
  list.innerHTML=all.map(u=>{
    const cfg=COLORS_CFG[u.cor];
    const isMe=u.id===0;
    const label=T[lang].colorLabels[u.cor];
    const canAction=!isMe&&u.cor!=='vermelho'&&u.cor!=='roxo';
    const actionBtn=canAction?`<button class="u-action" style="--uc:${cfg.hex};background:${cfg.hex}" onclick="alert('${u.cor==='verde'?t('hiBtn'):t('workoutBtn')} ${u.nome}!')">${u.cor==='verde'?t('hiBtn'):t('workoutBtn')}</button>`:'';
    return`<div class="user-card${isMe?' me':''}" style="${isMe?`--me-bg:${cfg.hex}12;--me-c:${cfg.hex}`:''}" >
      <div class="u-avatar-wrap">
        <div class="u-avatar" style="--uc:${cfg.hex};border-color:${cfg.hex};color:${cfg.hex};box-shadow:0 0 10px ${cfg.hex}33">${u.avatar}</div>
        <div class="u-status-dot" style="--uc:${cfg.hex};background:${cfg.hex};box-shadow:0 0 5px ${cfg.hex}"></div>
      </div>
      <div class="u-info">
        <div class="u-name">${u.nome}${isMe?` <span style="font-size:10px;color:${cfg.hex}">${t('youTag')}</span>`:''}</div>
        <div class="u-color" style="color:${cfg.hex}">${label}</div>
        <div class="u-bio">${u.bio}</div>
      </div>
      ${actionBtn}
    </div>`;
  }).join('');
}

// ─── QR ───────────────────────────────────────
function updateQR(){
  if(!myColor) return;
  const cfg=COLORS_CFG[myColor];
  const label=T[lang].colorLabels[myColor];
  const emoji=getEmoji(myColor);

  // Draw QR
  const svg=document.getElementById('qr-svg');
  if(svg){
    let cells='';
    for(let r=0;r<7;r++) for(let c=0;c<7;c++){
      const corner=(r<3&&c<3)||(r<3&&c>3)||(r>3&&c<3);
      const pat=(r*7+c*3+r+c)%3===0;
      cells+=`<rect x="${r*20+5}" y="${c*20+5}" width="16" height="16" rx="${corner?3:2}" fill="${corner||pat?'#000':'#eee'}"/>`;
    }
    cells+=`<circle cx="75" cy="75" r="9" fill="${cfg.hex}"/>`;
    svg.innerHTML=`<rect width="150" height="150" fill="white" rx="4"/>${cells}`;
    svg.closest('.qr-wrap').style.borderColor=cfg.hex;
    svg.closest('.qr-wrap').style.boxShadow=`0 0 30px ${cfg.hex}44`;
  }

  const badge=document.getElementById('qr-badge');
  if(badge){
    badge.style.borderColor=cfg.hex;
    badge.style.color=cfg.hex;
    badge.style.boxShadow=`0 0 16px ${cfg.hex}33`;
    badge.innerHTML=`<div class="band-badge-dot" style="background:${cfg.hex};box-shadow:0 0 8px ${cfg.hex}"></div>${label} ${emoji}`;
  }

  const changeBtn=document.getElementById('qr-change-btn');
  if(changeBtn){ changeBtn.style.borderColor=cfg.hex; changeBtn.style.color=cfg.hex; changeBtn.textContent=t('changeColor'); }
}

// ─── BT ───────────────────────────────────────
function updateBT(){
  if(!myColor) return;
  const cfg=COLORS_CFG[myColor];
  const watch=document.getElementById('bt-watch');
  const btn=document.getElementById('bt-btn');
  const info=document.getElementById('bt-info');
  const check=document.getElementById('bt-check');
  const statusText=document.getElementById('bt-status-text');
  const syncRow=document.getElementById('bt-sync-row');
  const gymBadge=document.getElementById('gym-bt-badge');

  if(watch){
    watch.style.borderColor=btStatus==='connected'?cfg.hex:'#2a2a2a';
    watch.style.boxShadow=btStatus==='connected'?`0 0 36px ${cfg.hex}44`:'none';
  }
  if(check){
    check.style.display=btStatus==='connected'?'flex':'none';
    check.style.background=cfg.hex;
  }
  if(info){
    info.classList.toggle('show',btStatus==='connected');
    info.style.borderColor=cfg.hex+'44';
  }
  if(syncRow) syncRow.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${cfg.hex};flex-shrink:0"></div><span style="color:${cfg.hex};font-weight:600">${t('btSync')}</span>`;
  if(btn){
    if(btStatus==='idle'){ btn.style.background=cfg.hex; btn.style.color='#000'; btn.style.boxShadow=`0 4px 18px ${cfg.hex}44`; btn.textContent=t('btConnect'); btn.disabled=false; }
    else if(btStatus==='connecting'){ btn.style.background='#1a1a1a'; btn.style.color='#444'; btn.style.boxShadow='none'; btn.textContent=t('btConnecting'); btn.disabled=true; }
    else{ btn.style.background='none'; btn.style.color='#555'; btn.style.boxShadow='none'; btn.style.border='1.5px solid #333'; btn.textContent=t('btDisconnect'); btn.disabled=false; }
  }
  if(statusText){
    if(btStatus==='connecting') statusText.textContent='🔵 Bluetooth...';
    else if(btStatus==='connected') statusText.textContent=t('btConnected');
    else statusText.textContent='';
    statusText.style.color=btStatus==='connected'?'var(--green)':'var(--muted)';
  }
  if(gymBadge) gymBadge.style.display=btStatus==='connected'?'inline-block':'none';

  // labels
  const title=document.querySelector('.bt-title');
  if(title) title.textContent=t('btTitle');
  const desc=document.querySelector('.bt-desc');
  if(desc) desc.textContent=t('btDesc');
  const dev=document.querySelectorAll('.bt-info-row span[data-i18n="btDevice"]');
  document.querySelectorAll('[data-i18n="btDevice"]').forEach(el=>el.textContent=t('btDevice'));
  document.querySelectorAll('[data-i18n="btBattery"]').forEach(el=>el.textContent=t('btBattery'));
}

function toggleBT(){
  if(btStatus==='idle'){
    btStatus='connecting';
    updateBT();
    setTimeout(()=>{ btStatus='connected'; updateBT(); },2000);
  } else if(btStatus==='connected'){
    btStatus='idle';
    updateBT();
  }
}

// ─── MAP ──────────────────────────────────────
function initMap(){
  setTimeout(()=>{
    document.getElementById('map-locating').style.display='none';
    document.getElementById('map-content').style.display='block';
    renderMap();
  },1200);
}

function renderMap(){
  const accent=getAccent();
  const list=document.getElementById('gym-list');
  if(!list) return;
  list.innerHTML=GYMS.map(g=>`
    <button class="gym-item${g.id===selectedGym?' selected':''}"
      style="${g.id===selectedGym?`--sel-gym-bg:${accent}12`:''}; --accent:${accent}"
      onclick="selectGym(${g.id})">
      <div class="gym-icon">🏋️</div>
      <div style="flex:1">
        <div class="gym-name">${g.name}</div>
        <div class="gym-meta">${g.dist} · ${g.users} ${t('mapUsers')}</div>
      </div>
      <div class="gym-sel-dot" style="background:${accent};box-shadow:0 0 5px ${accent}"></div>
    </button>`).join('');

  const gymName=document.getElementById('map-gym-name');
  if(gymName){ const g=GYMS.find(x=>x.id===selectedGym); if(g) gymName.textContent=g.name; gymName.style.color=accent; }
  const mapVisual=document.getElementById('map-visual');
  if(mapVisual) mapVisual.style.borderColor=accent+'33';
  const mapBtn=document.getElementById('map-checkin-btn');
  if(mapBtn){ mapBtn.style.background=accent; mapBtn.style.boxShadow=`0 4px 18px ${accent}44`; mapBtn.textContent=t('mapCheckin'); }

  document.querySelectorAll('[data-i18n="nearbyGyms"]').forEach(el=>el.textContent=t('nearbyGyms'));
  document.querySelectorAll('[data-i18n="locating"]').forEach(el=>el.textContent=t('locating'));
}

function selectGym(id){
  selectedGym=id;
  renderMap();
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
applyI18n();
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-wrap')){
    document.querySelectorAll('.lang-dropdown').forEach(d=>d.classList.remove('open'));
  }
});
</script>
